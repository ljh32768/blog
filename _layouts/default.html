<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        /* 极简阅读排版，与你主页风格统一 */
        :root {
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --bg-color: #ffffff;
            --link-color: #3498db;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        body { font-family: var(--font-sans); color: var(--text-primary); background-color: var(--bg-color); margin: 0; padding: 0; line-height: 1.8; -webkit-font-smoothing: antialiased; }
        .post-container { max-width: 720px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 10px; }
        h2 { font-size: 1.5em; margin-top: 2em; }
        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { background-color: #f0f0f0; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
        pre { background-color: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
        pre code { background-color: transparent; padding: 0; }
        blockquote { border-left: 4px solid var(--link-color); padding-left: 1em; margin-left: 0; color: var(--text-secondary); }
        .back-link { display: inline-block; margin-bottom: 30px; color: var(--text-secondary); font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="post-container">
        <a class="back-link" href="/">← 返回首页</a>
        {{ content }}
    </div>
</body>
</html>
